name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            binary: catclaw-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary: catclaw-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            binary: catclaw-linux-arm64
            cross: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Install cross for Linux ARM64
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      # Build natively (macOS, Linux x86_64)
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      # Build with cross (Linux ARM64)
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/catclaw ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          for dir in */; do
            cp "$dir"/* ../
          done
          cd ..
          sha256sum catclaw-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            catclaw-darwin-arm64
            catclaw-linux-x86_64
            catclaw-linux-arm64
            checksums.txt
